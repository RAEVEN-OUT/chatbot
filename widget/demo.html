<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Widget Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        h1 {
            color: #126c57;
            margin-bottom: 1rem;
        }
        p {
            line-height: 1.6;
            color: #666;
        }
        .badge {
            background: #126c57;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Demo Page</h1>
        <p>This is a sample website to show how the FAQ Chatbot Widget looks and behaves when embedded.</p>
        <p>Check the bottom-right corner for the chat button!</p>
        <div class="badge">Live Chat Active</div>
    </div>

    <!-- The Chatbot Widget Script -->
    <script 
        src="https://chatbot.goride.net.in/widget/chatbot-widget.js" 
        data-site-id="demo-site" 
        data-api-base="https://chatbot.goride.net.in"
        data-collect-lead="true">
    </script>
</body>
</html>

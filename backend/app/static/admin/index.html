<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FAQ Chatbot Admin</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  </head>
  <body>
    <div id="loginOverlay" class="login-overlay active">
      <div class="login-card">
        <h2>Admin Login</h2>
        <form id="loginForm">
          <input type="email" id="loginEmail" placeholder="Email" required />
          <input type="password" id="loginPassword" placeholder="Password" required />
          <button type="submit">Sign In</button>
          <p id="loginError" class="error-text"></p>
        </form>
      </div>
    </div>

    <header class="topbar">
      <div class="topbar-left">
        <h1>FAQ Chatbot Admin</h1>
        <span id="globalLoading" class="loading-spinner" style="display:none;">Processing...</span>
      </div>
      <p id="statusText"></p>
      <div class="topbar-actions">
        <span id="userEmail"></span>
        <button id="logoutBtn" type="button" style="display:none;">Log Out</button>
      </div>
    </header>

    <main class="layout" id="mainLayout" style="display:none;">
      <aside class="sidebar">
        <button id="refreshBtn" type="button">Refresh</button>
        <nav class="tabs" aria-label="Admin sections">
          <button class="tab active" data-tab="sites" type="button">Sites</button>
          <button class="tab" data-tab="groups" type="button">Groups</button>
          <button class="tab" data-tab="faqs" type="button">FAQs</button>
          <button class="tab" data-tab="logs" type="button">Logs</button>
          <button class="tab" data-tab="analytics" type="button">Analytics</button>
          <button class="tab" data-tab="users" type="button">Users</button>
          <button class="tab" data-tab="tester" type="button">Tester</button>
        </nav>
      </aside>

      <section class="content">
        <section id="sites" class="panel active-panel">
          <div class="panel-heading">
            <h2>Sites</h2>
            <div class="toolbar">
              <input id="siteSearch" placeholder="Search sites" />
              <select id="siteFilter">
                <option value="active">Active</option>
                <option value="deleted">Deleted</option>
                <option value="all">All</option>
              </select>
              <button id="createSiteBtn" type="button">Create Site</button>
            </div>
          </div>
          <div id="sitesList" class="table"></div>
        </section>

        <section id="groups" class="panel">
          <div class="panel-heading">
            <h2>Groups</h2>
            <div class="toolbar">
              <input id="groupSearch" placeholder="Search groups" />
              <select id="groupFilter">
                <option value="all">All</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
          <form id="groupForm" class="form-grid">
            <input id="groupId" placeholder="group id, optional" />
            <input id="groupName" placeholder="Group name" required />
            <input id="groupDescription" placeholder="Description" />
            <div class="span-all">
              <label>Sites in group</label>
              <input id="groupSiteSearch" placeholder="Search sites" />
              <div id="groupSiteChecks" class="check-grid"></div>
            </div>
            <button type="submit">Save Group</button>
          </form>
          <div id="groupsList" class="table"></div>
        </section>

        <section id="faqs" class="panel">
          <div class="panel-heading">
            <h2>FAQs</h2>
            <div class="toolbar">
              <input id="faqSearch" placeholder="Search FAQs" />
              <input id="faqSiteChooser" list="siteOptions" placeholder="Choose site" />
              <input id="faqGroupChooser" list="groupOptions" placeholder="Choose group" />
              <button id="createFaqBtn" type="button">Add FAQ</button>
            </div>
          </div>
          <div id="faqsList" class="faq-list"></div>
        </section>

        <section id="logs" class="panel">
          <div class="panel-heading">
            <h2>Logs</h2>
            <div class="toolbar">
              <input id="logSearch" placeholder="Search logs" />
              <select id="logTypeFilter">
                <option value="">All types</option>
                <option value="faq_hit">FAQ hit</option>
                <option value="llm_fallback">LLM</option>
                <option value="helpline">Helpline</option>
              </select>
              <select id="logDateFilter">
                <option value="">All time</option>
                <option value="1d">1 day</option>
                <option value="7d">Last week</option>
                <option value="30d">Last month</option>
              </select>
              <label class="checkbox-row"><input id="fallbackOnly" type="checkbox" /> Hide FAQ hits</label>
            </div>
          </div>
          <div id="logsList" class="log-list"></div>
        </section>

        <section id="analytics" class="panel">
          <div class="panel-heading">
            <h2>Analytics</h2>
            <input id="analyticsSiteChooser" list="siteOptions" placeholder="Choose site" style="max-width:260px;" />
          </div>
          <div class="analytics-grid">
            <div class="stat-card"><h3>Total Queries</h3><p id="statTotal">0</p></div>
            <div class="stat-card"><h3>FAQ Hit Rate</h3><p id="statHitRate">0%</p><p id="statFaqHits" class="meta">0 hits</p></div>
            <div class="stat-card"><h3>AI Fallback Rate</h3><p id="statLlmRate">0%</p><p id="statLlmHits" class="meta">0 fallbacks</p></div>
            <div class="stat-card"><h3>Helpline Escaped</h3><p id="statHelplineRate">0%</p></div>
          </div>
          <div class="panel-heading"><h2>Top FAQs</h2></div>
          <div id="topFaqsList" class="table"></div>
        </section>

        <section id="users" class="panel">
          <div class="panel-heading"><h2>User Management</h2></div>
          <form id="userForm" class="form-grid">
            <input id="userEmailInput" type="email" placeholder="User email" required />
            <input id="userPasswordInput" type="password" placeholder="Initial password" required />
            <div class="span-all">
              <label>Assign sites</label>
              <input id="userSiteSearch" placeholder="Search assignable sites" />
              <div id="userSiteChecks" class="check-grid"></div>
            </div>
            <button type="submit" class="span-all">Create User</button>
          </form>
        </section>

        <section id="tester" class="panel">
          <div class="panel-heading">
            <h2>Tester</h2>
            <div class="toolbar">
              <input id="testerSiteChooser" list="siteOptions" placeholder="Choose site" />
              <span id="testerSiteName" class="meta">No site selected</span>
            </div>
          </div>
          <div id="testMessages" class="messages"></div>
          <form id="leadForm" class="form-grid">
            <input id="testName" placeholder="Name" />
            <input id="testEmail" placeholder="Email" />
            <input id="testPhone" placeholder="Phone" />
            <button id="startSessionBtn" type="submit">Start Session</button>
          </form>
          <form id="testForm" class="tester hidden">
            <input id="testQuestion" placeholder="Ask a question..." autocomplete="off" />
            <button id="testSendBtn" type="submit">Send</button>
          </form>
        </section>
      </section>
    </main>

    <datalist id="siteOptions"></datalist>
    <datalist id="groupOptions"></datalist>

    <dialog id="siteModal" class="modal">
      <form id="siteForm" class="form-grid modal-body">
        <input id="siteId" type="hidden" />
        <div class="modal-title span-all">
          <h2 id="siteModalTitle">Create Site</h2>
          <button id="closeSiteModalBtn" type="button" class="ghost">Close</button>
        </div>
        <input id="siteName" placeholder="Site name" required />
        <input id="siteDomain" placeholder="Domain" />
        <input id="siteHelpline" placeholder="Helpline number" required />
        <input id="siteWelcome" placeholder="Welcome message" />
        <input id="siteFallback" placeholder="Fallback message" />
        <input id="siteAcceptDistance" type="number" min="0" max="2" step="0.01" placeholder="FAQ accept distance" />
        <input id="siteCandidateDistance" type="number" min="0" max="2" step="0.01" placeholder="LLM candidate distance" />
        <input id="siteAllowedOrigins" placeholder="Allowed origins, comma separated" />
        <div class="span-all branding-row">
          <label>Color <input id="sitePrimaryColor" type="color" value="#22c55e" /></label>
          <input id="siteBotName" placeholder="Bot display name" />
          <input id="siteBotAvatar" placeholder="Bot avatar URL" />
          <input id="siteLauncherIcon" placeholder="Icon" />
        </div>
        <label class="checkbox-row"><input id="siteActive" type="checkbox" checked /> Active</label>
        <div class="form-actions span-all">
          <button type="submit">Save Site</button>
          <button id="repairSiteBtn" type="button" class="ghost">Repair Vectors</button>
          <button id="deleteSiteBtn" type="button" class="danger">Delete</button>
        </div>
      </form>
    </dialog>

    <dialog id="faqModal" class="modal">
      <form id="faqForm" class="faq-form modal-body">
        <div class="modal-title">
          <h2 id="faqModalTitle">Add FAQ</h2>
          <button id="closeFaqModalBtn" type="button" class="ghost">Close</button>
        </div>
        <input id="faqId" type="hidden" />
        <input id="faqTargetSite" list="siteOptions" placeholder="Target site" />
        <input id="faqTargetGroup" list="groupOptions" placeholder="Target group" />
        <input id="faqQuestion" placeholder="Question" required />
        <textarea id="faqAliases" placeholder="Aliases, one per line"></textarea>
        <textarea id="faqAnswer" placeholder="Exact answer to return" required></textarea>
        <div class="form-actions">
          <button type="submit">Save FAQ</button>
          <button id="clearFaqBtn" type="button">Clear</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Owner Portal | FAQ Chatbot</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Auth Section -->
        <section id="auth-section" class="auth-container hidden">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Portal Login</h1>
                    <p>Manage your site's FAQs</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" required placeholder="name@company.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Sign In
                    </button>
                    <div id="login-error" class="error-msg hidden" style="color: #ef4444; margin-top: 1rem; text-align: center; font-size: 0.875rem;"></div>
                </form>
            </div>
        </section>

        <!-- Main Dashboard Section -->
        <section id="dashboard-section" class="hidden">
            <nav class="navbar">
                <div class="nav-brand">
                    <div class="logo">💬</div>
                    <span>Site Portal</span>
                </div>
                <div class="nav-user">
                    <span id="user-email" style="margin-right: 1rem; font-size: 0.875rem; font-weight: 600;"></span>
                    <button id="logout-btn" class="btn btn-secondary btn-sm">Logout</button>
                </div>
            </nav>

            <main class="main-content">
                <div style="display: flex; gap: 2rem; margin-bottom: 2rem; align-items: flex-end; flex-wrap: wrap;">
                    <div id="site-selector-container" class="form-group" style="max-width: 300px; margin-bottom: 0;">
                        <label>Manage Site:</label>
                        <select id="site-selector">
                            <!-- Sites populated here -->
                        </select>
                    </div>
                    <div style="margin-bottom: 0.5rem; font-weight: 700; color: var(--text-muted);">OR</div>
                    <div id="group-selector-container" class="form-group" style="max-width: 300px; margin-bottom: 0;">
                        <label>Manage Group:</label>
                        <select id="group-selector">
                            <option value="">-- No Group Selected --</option>
                            <!-- Groups populated here -->
                        </select>
                    </div>
                    <button id="manage-groups-btn" class="btn btn-secondary btn-sm" style="margin-bottom: 0;">
                        Edit Groups
                    </button>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div id="stat-total" class="stat-value">0</div>
                        <div class="stat-label">Total Questions</div>
                    </div>
                    <div class="stat-card">
                        <div id="stat-hits" class="stat-value">0%</div>
                        <div class="stat-label">Success Rate</div>
                    </div>
                    <div class="stat-card">
                        <div id="stat-faqs" class="stat-value">0</div>
                        <div class="stat-label">FAQs Indexed</div>
                    </div>
                </div>

                <!-- FAQ Management -->
                <div class="page-header">
                    <h2>Manage FAQs</h2>
                    <button id="add-faq-btn" class="btn btn-primary">
                        <span>+</span> Add New FAQ
                    </button>
                </div>

                <div class="card">
                    <div id="faq-list">
                        <!-- FAQs populated here -->
                        <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
                            Loading FAQs...
                        </div>
                    </div>
                </div>
            </main>
        </section>
    </div>

    <!-- FAQ Modal -->
    <div id="faq-modal" class="modal-backdrop hidden">
        <div class="modal">
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Add FAQ</h2>
            <form id="faq-form">
                <input type="hidden" id="faq-id">
                <div class="form-group">
                    <label>Question</label>
                    <input type="text" id="faq-question" required placeholder="What are your hours?">
                </div>
                <div class="form-group">
                    <label>Answer</label>
                    <textarea id="faq-answer" required rows="4" placeholder="We are open 9am-5pm..."></textarea>
                </div>
                <div class="form-group">
                    <label>Search Keywords / Aliases (one per line)</label>
                    <textarea id="faq-aliases" rows="3" placeholder="working hours&#10;closing time"></textarea>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save FAQ</button>
                    <button type="button" id="close-modal-btn" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Group Modal -->
    <div id="group-modal" class="modal-backdrop hidden">
        <div class="modal" style="max-width: 600px;">
            <h2 id="group-modal-title">Manage Groups</h2>
            <div id="group-list-container" style="margin: 1.5rem 0; max-height: 300px; overflow-y: auto; border: 1px solid var(--border); border-radius: 0.5rem;">
                <!-- List of existing groups -->
            </div>
            
            <div id="group-editor" class="hidden" style="border-top: 2px solid var(--border); padding-top: 1.5rem; margin-top: 1.5rem;">
                <h3 id="editor-title" style="font-size: 1rem; margin-bottom: 1rem;">Create New Group</h3>
                <form id="group-form">
                    <input type="hidden" id="group-id">
                    <div class="form-group">
                        <label>Group Name</label>
                        <input type="text" id="group-name" required placeholder="e.g. Madurai Hotels">
                    </div>
                    <div class="form-group">
                        <label>Select Sites for this Group</label>
                        <div id="group-sites-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.5rem; max-height: 150px; overflow-y: auto;">
                            <!-- Checkboxes for sites -->
                        </div>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <button type="submit" class="btn btn-primary" style="flex: 1;">Save Group</button>
                        <button type="button" id="cancel-group-btn" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-top: 1.5rem;">
                <button id="new-group-btn" class="btn btn-primary btn-sm">+ New Group</button>
                <button id="close-group-modal-btn" class="btn btn-secondary btn-sm">Close</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
